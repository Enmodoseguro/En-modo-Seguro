name: Actualizar noticias

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python actualizar_noticias.py

      - name: Guardar noticias actualizadas
        run: |
          git config user.name "noticias-bot"
          git config user.email "noticias-bot@users.noreply.github.com"
          git add noticias.json
          git commit -m "Actualiza noticias" || echo "Sin cambios"
          git push
